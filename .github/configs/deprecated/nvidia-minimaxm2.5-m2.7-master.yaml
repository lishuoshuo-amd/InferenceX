        decode:
          num-worker: 1
          tp: 8
          ep: 8
          dp-attn: true
    - isl: 8192
      osl: 1024
      search-space:
      - conc-list: [2, 4, 8, 16]
        prefill:
          num-worker: 1
          tp: 1
          ep: 1
          dp-attn: false
          additional-settings:
          - "CONFIG_FILE=recipes/vllm/minimax-m2.5/8k1k/tp4-1p1d.yaml"
        decode:
          num-worker: 1
          tp: 4
