minimaxm2.5-fp8-mi355x-vllm-disagg:
  image: vllm/vllm-openai-rocm:nightly-a6682d1d259cca69a9ae737ea5608fbbe7520031
  model: MiniMaxAI/MiniMax-M2.5
  model-prefix: minimaxm2.5
  runner: mi355x-disagg
  precision: fp8
  framework: vllm-disagg
  multinode: true
  disagg: true
  scenarios:
    fixed-seq-len:
    - isl: 1024
      osl: 1024
      search-space:
      # 1P2D: 1 prefill node (co-located with proxy) + 2 decode nodes = 3 nodes total
      # Prefill also needs EP=8: MiniMax M2.5 expert intermediate_size=1536,
      # TP8 shards to 192 which is not divisible by FP8 block_n=128.
      - spec-decoding: "none"
        conc-list: [ 8, 16, 32, 64, 128, 256, 512 ]
        prefill:
          num-worker: 1
          tp: 8
          ep: 8
          dp-attn: false
          additional-settings:
          - "PREFILL_NODES=1"
          - "VLLM_MORIIO_CONNECTOR_READ_MODE=1"
        decode:
          num-worker: 2
          tp: 8
          ep: 8
          dp-attn: false
          additional-settings:
          - "DECODE_NODES=2"

    - isl: 8192
      osl: 1024
      search-space:
      - spec-decoding: "none"
        conc-list: [ 8, 16, 32, 64, 128, 256, 512 ]
        prefill:
          num-worker: 1
          tp: 8
          ep: 8
          dp-attn: false
          additional-settings:
          - "PREFILL_NODES=1"
          - "VLLM_MORIIO_CONNECTOR_READ_MODE=1"
        decode:
          num-worker: 2
          tp: 8
          ep: 8
          dp-attn: false
          additional-settings:
          - "DECODE_NODES=2"
