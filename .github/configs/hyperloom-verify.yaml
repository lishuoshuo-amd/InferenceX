# Hyperloom verify-pr lookup table.
# Maps Hyperloom-managed bench scripts to the local model path + the single
# (tp, conc, isl, osl) configuration we run for PR validation.
#
# Used ONLY by .github/workflows/verify-pr.yml on this fork. Not consumed by
# any upstream sweep / matrix logic.
#
# To add a new model: add an entry whose key is the script filename (under
# benchmarks/single_node/) and fill in model_path / image / framework / etc.
# To bump the verify config later (e.g. 2 conc points), extend `runs` to a list.

scripts:
  dsr1_fp8_mi355x.sh:
    model_path: /hyperloom/models/DeepSeek-R1-0528
    image: lmsysorg/sglang:v0.5.9-rocm700-mi35x
    framework: sglang
    tp: 8
    conc: 32
    isl: 1024
    osl: 1024

