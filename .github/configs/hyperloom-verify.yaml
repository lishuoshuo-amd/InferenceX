# Hyperloom verify-pr lookup table.
#
# For each Hyperloom-managed bench script under benchmarks/single_node/, we
# only need to know:
#   - model_path:        local NFS path on the SaFE ARC GPU runners
#                        (mounted read-only into docker; .sh's `hf download`
#                        is patched to a no-op by the workflow)
#   - master_config_key: the matching key in .github/configs/amd-master.yaml
#                        — verify-pr.yml expands the full (tp, conc, isl, osl)
#                        search-space from there at runtime so we always
#                        match upstream's sweep exactly.
#
# Used ONLY by .github/workflows/verify-pr.yml on this fork. Not consumed by
# any upstream sweep / matrix logic.

scripts:
  dsr1_fp8_mi300x.sh:
    model_path: /wekafs/models/DeepSeek-R1-0528
    master_config_key: dsr1-fp8-mi300x-sglang
    dashboard_model: DeepSeek-R1-0528
    dashboard_precision: fp8
    dashboard_framework: sglang

  qwen3.5_bf16_mi300x.sh:
    model_path: /wekafs/models/Qwen-Qwen3.5-397B-A17B
    master_config_key: qwen3.5-bf16-mi300x-sglang
    dashboard_model: Qwen-3.5-397B-A17B
    dashboard_precision: bf16
    dashboard_framework: sglang

  # TODO: re-enable once amd-master.yaml adds `glm5-fp8-mi300x-sglang`.
  # glm5_fp8_mi300x.sh:
  #   model_path: /wekafs/models/GLM-5-FP8
  #   master_config_key: glm5-fp8-mi300x-sglang
  #   dashboard_model: GLM-5
  #   dashboard_precision: fp8
  #   dashboard_framework: sglang

  kimik2.5_int4_mi300x.sh:
    model_path: /wekafs/models/Kimi-K2.5
    master_config_key: kimik2.5-int4-mi300x-vllm
    dashboard_model: Kimi-K2.5
    dashboard_precision: int4
    dashboard_framework: vllm

  minimaxm2.5_fp8_mi300x.sh:
    model_path: /wekafs/models/MiniMaxAI-MiniMax-M2.5
    master_config_key: minimaxm2.5-fp8-mi300x-vllm
    dashboard_model: MiniMax-M2.5
    dashboard_precision: fp8
    dashboard_framework: vllm

  gptoss_fp4_mi300x.sh:
    model_path: /wekafs/models/gpt-oss-120b
    master_config_key: gptoss-fp4-mi300x-vllm
    dashboard_model: gpt-oss-120b
    dashboard_precision: fp4
    dashboard_framework: vllm
