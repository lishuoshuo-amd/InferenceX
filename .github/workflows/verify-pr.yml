name: Verify PR (Hyperloom)
run-name: Verify PR - ${{ github.event.pull_request.title || github.sha }}

# Triggered when an auto-PR from Hyperloom gets the `verify-enabled` label
# (also re-runs on synchronize so PR updates re-verify automatically).
# Distinct from upstream's `sweep-enabled` label so we don't accidentally
# trigger run-sweep.yml (which can't run on fork without internal secrets).
# Detects which mi355x bench scripts changed, then for each script expands
# the full (tp, conc, isl, osl) search-space from amd-master.yaml and runs
# baseline (PR base ref) + optimized (PR head ref) for every point inside
# its docker image on the SaFE ARC runner scale set, posting a gain% table
# back to the PR. Each changed script runs as an independent matrix job.

on:
  pull_request:
    types: [labeled, synchronize]
    paths:
      - "benchmarks/single_node/*mi355x*.sh"
      - "benchmarks/benchmark_lib.sh"

concurrency:
  group: verify-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  detect:
    if: contains(github.event.pull_request.labels.*.name, 'verify-enabled')
    runs-on: ubuntu-latest
    outputs:
      scripts: ${{ steps.expand.outputs.scripts }}
      count: ${{ steps.expand.outputs.count }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install yq + pydantic (no sudo)
        run: |
          mkdir -p "$HOME/bin"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          wget -qO "$HOME/bin/yq" \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          chmod +x "$HOME/bin/yq"
          pip install --quiet pydantic pyyaml

      - id: expand
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # Whitelist of scripts we know how to verify
          mapfile -t WHITELIST < <(yq '.scripts | keys | .[]' \
            .github/configs/hyperloom-verify.yaml)
          echo "Whitelist: ${WHITELIST[*]}"

          # Files changed in this PR under benchmarks/single_node/
          mapfile -t CHANGED < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- \
            'benchmarks/single_node/*.sh' | xargs -n1 basename || true)
          echo "Changed scripts: ${CHANGED[*]:-<none>}"

          # Intersect changed ∩ whitelist; emit one expanded JSON per script.
          # The expanded payload contains every (tp, conc, isl, osl) point that
          # upstream would run via amd-master.yaml — we use upstream's own
          # generator script so we always stay aligned.
          MATCHED=()
          declare -A SCRIPT_RUNS
          for s in "${CHANGED[@]:-}"; do
            for w in "${WHITELIST[@]}"; do
              if [[ "$s" == "$w" ]]; then
                key=$(yq -r ".scripts[\"$s\"].master_config_key" \
                  .github/configs/hyperloom-verify.yaml)
                runs=$(python3 utils/matrix_logic/generate_sweep_configs.py \
                  test-config \
                  --config-keys "$key" \
                  --config-files .github/configs/amd-master.yaml \
                  --no-evals \
                  | jq -c '[.[] | {tp, conc, isl, osl}]')
                npts=$(echo "$runs" | jq 'length')
                echo "  $s ($key): $npts points"
                MATCHED+=("$s")
                SCRIPT_RUNS["$s"]="$runs"
                break
              fi
            done
          done

          if [[ ${#MATCHED[@]} -eq 0 ]]; then
            echo "scripts=[]" >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
          else
            JSON='[]'
            for s in "${MATCHED[@]}"; do
              JSON=$(echo "$JSON" | jq -c \
                --arg name "$s" \
                --argjson runs "${SCRIPT_RUNS[$s]}" \
                '. += [{name: $name, runs: $runs}]')
            done
            echo "scripts=$JSON" >> "$GITHUB_OUTPUT"
            echo "count=${#MATCHED[@]}" >> "$GITHUB_OUTPUT"
          fi
          echo "Matched scripts: ${MATCHED[*]:-<none>}"

  verify:
    needs: detect
    if: needs.detect.outputs.count != '0'
    runs-on: inferencexfork-t25db
    timeout-minutes: 1440
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        script: ${{ fromJson(needs.detect.outputs.scripts) }}
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      MODELS_ROOT: /hyperloom/models
      RANDOM_RANGE_RATIO: "0.8"
      SCRIPT: ${{ matrix.script.name }}
      RUNS_JSON: ${{ toJson(matrix.script.runs) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install yq + jq (no sudo, runner-local)
        run: |
          mkdir -p "$HOME/bin"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          if ! command -v yq >/dev/null; then
            wget -qO "$HOME/bin/yq" \
              https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
            chmod +x "$HOME/bin/yq"
          fi
          if ! command -v jq >/dev/null; then
            wget -qO "$HOME/bin/jq" \
              https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux-amd64
            chmod +x "$HOME/bin/jq"
          fi

      - name: Preflight check (docker / GPU / models)
        run: |
          set -e
          docker info >/dev/null
          ls /dev/kfd /dev/dri >/dev/null
          test -d "$MODELS_ROOT" || { echo "Missing $MODELS_ROOT"; exit 1; }

      - name: Run baseline + optimized for ${{ matrix.script.name }}
        run: |
          set -uo pipefail
          mkdir -p verify-results
          SUMMARY=verify-results/summary-${SCRIPT%.sh}.json
          echo '[]' > "$SUMMARY"

          cfg=".github/configs/hyperloom-verify.yaml"
          IMAGE=$(yq -r ".scripts[\"$SCRIPT\"].image // \"\"" $cfg)
          MODEL=$(yq -r ".scripts[\"$SCRIPT\"].model_path" $cfg)
          KEY=$(yq -r ".scripts[\"$SCRIPT\"].master_config_key" $cfg)
          # If image not pinned in lookup table, fetch it from amd-master.yaml
          if [[ -z "$IMAGE" || "$IMAGE" == "null" ]]; then
            IMAGE=$(yq -r ".[\"$KEY\"].image" .github/configs/amd-master.yaml)
          fi
          echo "Script: $SCRIPT  Key: $KEY  Image: $IMAGE  Model: $MODEL"

          run_one() {
            # $1=mode (baseline|optimized)  $2=ref  $3=tp  $4=conc  $5=isl  $6=osl
            local mode=$1 ref=$2 tp=$3 conc=$4 isl=$5 osl=$6
            local mml=$((isl + osl + 200))
            local tag="${mode}-tp${tp}-conc${conc}-${isl}_${osl}"

            echo "::group::Run $tag @ $ref :: $SCRIPT"
            local work="verify-results/${SCRIPT%.sh}_${tag}"
            rm -rf "$work" && mkdir -p "$work"
            git --work-tree="$work" checkout "$ref" -- benchmarks utils runners 2>/dev/null || \
              git --work-tree="$work" checkout "$ref" -- benchmarks utils

            sed -i 's|^[[:space:]]*hf download.*|true # patched: model is local|' \
              "$work/benchmarks/single_node/$SCRIPT"

            docker pull "$IMAGE" || true

            local result_file="verify-${tag}-${SCRIPT%.sh}"
            set +e
            docker run --rm \
              --device=/dev/kfd --device=/dev/dri --group-add video \
              --security-opt seccomp=unconfined --cap-add=SYS_PTRACE \
              --network host --ipc host --shm-size 16g \
              -v "$PWD/$work":/workspace -w /workspace \
              -v "$MODELS_ROOT":"$MODELS_ROOT":ro \
              -e MODEL="$MODEL" -e TP="$tp" -e CONC="$conc" \
              -e ISL="$isl" -e OSL="$osl" -e MAX_MODEL_LEN="$mml" \
              -e RANDOM_RANGE_RATIO="$RANDOM_RANGE_RATIO" \
              -e RESULT_FILENAME="$result_file" \
              -e RUN_EVAL=false -e EVAL_ONLY=false -e EXP_NAME=verify \
              "$IMAGE" \
              bash benchmarks/single_node/$SCRIPT
            local rc=$?
            set -e

            local json="$work/${result_file}.json"
            local throughput="null"
            if [[ -f "$json" ]]; then
              throughput=$(jq -r '.output_throughput // .total_token_throughput // .request_throughput // empty' "$json" || true)
            fi
            cp -f "$work/server.log" "verify-results/${tag}-${SCRIPT%.sh}.server.log" 2>/dev/null || true
            [[ -f "$json" ]] && cp -f "$json" "verify-results/${result_file}.json"

            jq --arg s "$SCRIPT" --arg m "$mode" --arg t "${throughput:-null}" \
               --arg tp "$tp" --arg c "$conc" --arg i "$isl" --arg o "$osl" --arg rc "$rc" \
               '. += [{script:$s, mode:$m, throughput:($t|tonumber? // null),
                       tp:($tp|tonumber), conc:($c|tonumber),
                       isl:($i|tonumber), osl:($o|tonumber),
                       exit_code:($rc|tonumber)}]' \
               "$SUMMARY" > "$SUMMARY.tmp" && mv "$SUMMARY.tmp" "$SUMMARY"

            docker ps -q --filter "ancestor=$IMAGE" | xargs -r docker rm -f >/dev/null 2>&1 || true
            echo "::endgroup::"
          }

          NPTS=$(echo "$RUNS_JSON" | jq 'length')
          echo "Will run $NPTS points (× 2 for baseline+optimized) for $SCRIPT"

          for i in $(seq 0 $((NPTS - 1))); do
            tp=$(echo "$RUNS_JSON" | jq -r ".[$i].tp")
            conc=$(echo "$RUNS_JSON" | jq -r ".[$i].conc")
            isl=$(echo "$RUNS_JSON" | jq -r ".[$i].isl")
            osl=$(echo "$RUNS_JSON" | jq -r ".[$i].osl")
            echo "─── point $((i+1))/$NPTS: tp=$tp conc=$conc isl=$isl osl=$osl ───"
            run_one baseline  "$BASE_SHA" "$tp" "$conc" "$isl" "$osl"
            run_one optimized "$HEAD_SHA" "$tp" "$conc" "$isl" "$osl"
          done

          echo "=== summary for $SCRIPT ==="
          cat "$SUMMARY"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verify-pr-results-${{ matrix.script.name }}
          path: verify-results/
          retention-days: 30

  comment:
    needs: [detect, verify]
    if: always() && needs.verify.result != 'skipped' && needs.detect.outputs.count != '0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: all-results
          pattern: verify-pr-results-*
          merge-multiple: true
        continue-on-error: true

      - name: Render comment + post to PR
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          BODY=comment.md

          shopt -s nullglob
          summaries=(all-results/summary-*.json)
          if [[ ${#summaries[@]} -eq 0 ]]; then
            cat > "$BODY" <<EOF
          ### Verify PR (Hyperloom) — failed before producing results

          The verify jobs did not upload any summary. Check the workflow logs.
          EOF
          else
            python3 - "${summaries[@]}" > "$BODY" <<'PY'
          import json, sys, pathlib
          from collections import defaultdict
          rows = []
          for p in sys.argv[1:]:
              try:
                  rows.extend(json.loads(pathlib.Path(p).read_text()))
              except Exception as e:
                  print(f"<!-- failed to read {p}: {e} -->")

          # group by (script, tp, conc, isl, osl) → {baseline, optimized}
          buckets = defaultdict(dict)
          for r in rows:
              key = (r["script"], r["tp"], r["conc"], r["isl"], r["osl"])
              buckets[key][r["mode"]] = r

          print("### Verify PR (Hyperloom) — Unofficial smoke test\n")
          print("> Only the upstream [InferenceX](https://github.com/SemiAnalysisAI/InferenceX)")
          print("> repo contains the official benchmark of record. This fork verify reproduces")
          print("> the full (tp, conc, isl, osl) search-space from `amd-master.yaml` for each")
          print("> changed script, running both PR base and PR head; results below are a")
          print("> smoke-test indicator. ±2% is treated as noise (verdict OK).\n")

          # one table per script, sorted points inside
          by_script = defaultdict(list)
          for key, modes in buckets.items():
              by_script[key[0]].append((key, modes))

          for script in sorted(by_script):
              print(f"#### `{script}`\n")
              print("| isl/osl | tp | conc | baseline (tok/s) | optimized (tok/s) | gain | verdict |")
              print("|---|---|---|---|---|---|---|")
              entries = sorted(
                  by_script[script],
                  key=lambda kv: (kv[0][3], kv[0][4], kv[0][1], kv[0][2]),
              )
              for (s, tp, conc, isl, osl), modes in entries:
                  b = modes.get("baseline", {}); o = modes.get("optimized", {})
                  bt, ot = b.get("throughput"), o.get("throughput")
                  isl_osl = f"{isl//1024}k{osl//1024}k" if isl % 1024 == 0 and osl % 1024 == 0 else f"{isl}/{osl}"
                  if bt and ot:
                      gain = (ot - bt) / bt * 100
                      verdict = "OK" if gain >= -2.0 else "WARN: regression"
                      print(f"| {isl_osl} | {tp} | {conc} | {bt:.2f} | {ot:.2f} | {gain:+.2f}% | {verdict} |")
                  else:
                      print(f"| {isl_osl} | {tp} | {conc} | {bt or 'FAIL'} | {ot or 'FAIL'} | n/a | FAIL |")
              print()
          PY
          fi

          gh pr comment "$PR" --repo "$REPO" --body-file "$BODY"
