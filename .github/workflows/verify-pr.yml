name: Verify PR (Hyperloom)
run-name: Verify PR - ${{ github.event.pull_request.title || github.sha }}

# Triggered when an auto-PR from Hyperloom gets the `verify-enabled` label
# (also re-runs on synchronize so PR updates re-verify automatically).
# Detects which mi300x bench scripts changed, then for each script creates
# a SaFE training pod that runs baseline (PR base) + optimized (PR head)
# for the full (tp, conc, isl, osl) search-space from amd-master.yaml,
# posting a gain% table back to the PR.

on:
  pull_request:
    types: [labeled, synchronize]
    paths:
      - "benchmarks/single_node/*mi300x*.sh"
      - "benchmarks/benchmark_lib.sh"
      - ".github/scripts/**"
      - ".github/configs/hyperloom-verify.yaml"
      - ".github/workflows/verify-pr.yml"

concurrency:
  group: verify-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  detect:
    if: contains(github.event.pull_request.labels.*.name, 'verify-enabled')
    runs-on: ubuntu-latest
    outputs:
      scripts: ${{ steps.expand.outputs.scripts }}
      count: ${{ steps.expand.outputs.count }}
      dashboard_map: ${{ steps.expand.outputs.dashboard_map }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install yq + pydantic (no sudo)
        run: |
          mkdir -p "$HOME/bin"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          wget -qO "$HOME/bin/yq" \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          chmod +x "$HOME/bin/yq"
          pip install --quiet pydantic pyyaml

      - id: expand
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          mapfile -t WHITELIST < <(yq '.scripts | keys | .[]' \
            .github/configs/hyperloom-verify.yaml)
          echo "Whitelist: ${WHITELIST[*]}"

          mapfile -t CHANGED < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- \
            'benchmarks/single_node/*.sh' | xargs -n1 basename || true)
          echo "Changed scripts: ${CHANGED[*]:-<none>}"

          # If infra files changed, verify ALL whitelisted scripts
          INFRA_CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- \
            'benchmarks/benchmark_lib.sh' '.github/scripts/**' \
            '.github/configs/hyperloom-verify.yaml' '.github/workflows/verify-pr.yml' || true)
          if [[ -n "$INFRA_CHANGED" && ${#CHANGED[@]} -eq 0 ]]; then
            echo "Infra files changed, verifying all whitelisted scripts"
            CHANGED=("${WHITELIST[@]}")
          fi

          MATCHED=()
          declare -A SCRIPT_RUNS
          for s in "${CHANGED[@]:-}"; do
            for w in "${WHITELIST[@]}"; do
              if [[ "$s" == "$w" ]]; then
                key=$(yq -r ".scripts[\"$s\"].master_config_key" \
                  .github/configs/hyperloom-verify.yaml)
                runs=$(python3 utils/matrix_logic/generate_sweep_configs.py \
                  test-config \
                  --config-keys "$key" \
                  --config-files .github/configs/amd-master.yaml \
                  --no-evals \
                  | jq -c '[.[] | {tp, conc, isl, osl, ep: (.ep // 1)}]')
                npts=$(echo "$runs" | jq 'length')
                echo "  $s ($key): $npts points"
                MATCHED+=("$s")
                SCRIPT_RUNS["$s"]="$runs"
                break
              fi
            done
          done

          if [[ ${#MATCHED[@]} -eq 0 ]]; then
            echo "scripts=[]" >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
            echo "dashboard_map={}" >> "$GITHUB_OUTPUT"
          else
            JSON='[]'
            DASH_MAP='{}'
            for s in "${MATCHED[@]}"; do
              JSON=$(echo "$JSON" | jq -c \
                --arg name "$s" \
                --argjson runs "${SCRIPT_RUNS[$s]}" \
                '. += [{name: $name, runs: $runs}]')
              cfg=".github/configs/hyperloom-verify.yaml"
              dash_model=$(yq -r ".scripts[\"$s\"].dashboard_model // \"\"" "$cfg")
              dash_prec=$(yq -r ".scripts[\"$s\"].dashboard_precision // \"\"" "$cfg")
              dash_fw=$(yq -r ".scripts[\"$s\"].dashboard_framework // \"\"" "$cfg")
              if [[ -n "$dash_model" && "$dash_model" != "null" ]]; then
                DASH_MAP=$(echo "$DASH_MAP" | jq -c \
                  --arg k "$s" --arg m "$dash_model" --arg p "$dash_prec" --arg f "$dash_fw" \
                  '. + {($k): {model: $m, precision: $p, framework: $f}}')
              fi
            done
            echo "scripts=$JSON" >> "$GITHUB_OUTPUT"
            echo "count=${#MATCHED[@]}" >> "$GITHUB_OUTPUT"
            echo "dashboard_map=$DASH_MAP" >> "$GITHUB_OUTPUT"
          fi
          echo "Matched scripts: ${MATCHED[*]:-<none>}"

  verify:
    needs: detect
    if: needs.detect.outputs.count != '0'
    runs-on: inferencexfork-n6nnm
    timeout-minutes: 1440
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        script: ${{ fromJson(needs.detect.outputs.scripts) }}
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      MODELS_ROOT: /hyperloom/models
      RANDOM_RANGE_RATIO: "0.8"
      SCRIPT: ${{ matrix.script.name }}
      RUNS_JSON: ${{ toJson(matrix.script.runs) }}
      SAFE_API_BASE: ${{ secrets.SAFE_API_BASE }}
      SAFE_API_KEY: ${{ secrets.SAFE_API_KEY }}
      SAFE_WORKSPACE_ID: ${{ secrets.SAFE_WORKSPACE_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          mkdir -p "$HOME/bin"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          if ! command -v yq >/dev/null; then
            curl -fsSL -o "$HOME/bin/yq" \
              https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
            chmod +x "$HOME/bin/yq"
          fi
          pip install --quiet requests 2>/dev/null || pip3 install --quiet requests

      - name: Resolve image + model from config
        id: cfg
        run: |
          set -euo pipefail
          cfg=".github/configs/hyperloom-verify.yaml"
          IMAGE=$(yq -r ".scripts[\"$SCRIPT\"].image // \"\"" $cfg)
          MODEL=$(yq -r ".scripts[\"$SCRIPT\"].model_path" $cfg)
          KEY=$(yq -r ".scripts[\"$SCRIPT\"].master_config_key" $cfg)
          if [[ -z "$IMAGE" || "$IMAGE" == "null" ]]; then
            IMAGE=$(yq -r ".[\"$KEY\"].image" .github/configs/amd-master.yaml)
          fi
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"
          echo "Script: $SCRIPT  Key: $KEY  Image: $IMAGE  Model: $MODEL"

      - name: Submit SaFE workload for ${{ matrix.script.name }}
        run: |
          set -euo pipefail
          NFS_DIR="/wekafs/shuoshuo/verify-pr/${{ github.event.pull_request.number }}/${SCRIPT%.sh}"
          python3 .github/scripts/verify_runner.py \
            --script "$SCRIPT" \
            --runs-json "$RUNS_JSON" \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA" \
            --image "${{ steps.cfg.outputs.image }}" \
            --model-path "${{ steps.cfg.outputs.model }}" \
            --models-root "$MODELS_ROOT" \
            --random-range-ratio "$RANDOM_RANGE_RATIO" \
            --repo "${{ github.repository }}" \
            --nfs-result-dir "$NFS_DIR" \
            --output-dir verify-results \
            --safe-api-key "$SAFE_API_KEY" \
            --safe-workspace-id "$SAFE_WORKSPACE_ID" \
            --no-verify-ssl \
            --gpu-count 8 \
            --cpu 64 \
            --memory 1024Gi \
            --timeout 54000

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verify-pr-results-${{ matrix.script.name }}
          path: verify-results/
          retention-days: 30

  comment:
    needs: [detect, verify]
    if: always() && needs.verify.result != 'skipped' && needs.detect.outputs.count != '0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/scripts/dashboard_client.py

      - uses: actions/download-artifact@v4
        with:
          path: all-results
          pattern: verify-pr-results-*
          merge-multiple: true
        continue-on-error: true

      - name: Render comment + post to PR
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          DASHBOARD_MAP: ${{ needs.detect.outputs.dashboard_map }}
        run: |
          set -euo pipefail
          BODY=comment.md

          shopt -s nullglob
          summaries=(all-results/summary-*.json)
          if [[ ${#summaries[@]} -eq 0 ]]; then
            cat > "$BODY" <<EOF
          ### Verify PR (Hyperloom) — failed before producing results

          The verify jobs did not upload any summary. Check the workflow logs.
          EOF
          else
            python3 - "${summaries[@]}" > "$BODY" <<'PY'
          import json, os, sys, pathlib
          from collections import defaultdict
          sys.path.insert(0, ".github/scripts")
          from dashboard_client import fetch_official_reference

          dashboard_map = json.loads(os.environ.get("DASHBOARD_MAP", "{}"))

          rows = []
          for p in sys.argv[1:]:
              try:
                  rows.extend(json.loads(pathlib.Path(p).read_text()))
              except Exception as e:
                  print(f"<!-- failed to read {p}: {e} -->")

          throughput_rows = [r for r in rows if not r.get("mode", "").endswith("-eval")]
          eval_rows = [r for r in rows if r.get("mode", "").endswith("-eval")]

          buckets = defaultdict(dict)
          for r in throughput_rows:
              key = (r["script"], r["tp"], r["conc"], r["isl"], r["osl"])
              buckets[key][r["mode"]] = r

          eval_by_script = defaultdict(dict)
          for r in eval_rows:
              mode = r["mode"].replace("-eval", "")
              eval_by_script[r["script"]][mode] = r

          # Fetch official Dashboard data per script (with precision/framework filter)
          official_cache = {}
          for script, dash_cfg in dashboard_map.items():
              if isinstance(dash_cfg, str):
                  dash_cfg = {"model": dash_cfg}
              if dash_cfg.get("model"):
                  official_cache[script] = fetch_official_reference(
                      dash_cfg["model"],
                      precision=dash_cfg.get("precision") or None,
                      framework=dash_cfg.get("framework") or None,
                  )

          print("### Verify PR (Hyperloom) — Unofficial smoke test\n")
          print("> Compares PR base (Baseline) and PR head (Optimized) against the")
          print("> [InferenceX Dashboard](https://inferencex.semianalysis.com/inference)")
          print("> official MI300X reference. ±2% gain is treated as noise (verdict OK).\n")

          by_script = defaultdict(list)
          for key, modes in buckets.items():
              by_script[key[0]].append((key, modes))

          for script in sorted(by_script):
              official = official_cache.get(script, {})
              ref_date = ""
              if official:
                  ref_date = next(iter(official.values()), {}).get("date", "")

              print(f"#### `{script}`\n")

              # Summary line
              entries = sorted(
                  by_script[script],
                  key=lambda kv: (kv[0][3], kv[0][4], kv[0][1], kv[0][2]),
              )
              gains, aligns = [], []
              for (s, tp, conc, isl, osl), modes in entries:
                  b = modes.get("baseline", {}); o = modes.get("optimized", {})
                  bt = b.get("output_tput_per_gpu"); ot = o.get("output_tput_per_gpu")
                  ref = official.get((isl, osl, conc, tp), {})
                  rt = ref.get("output_tput_per_gpu")
                  if bt and ot and bt > 0:
                      gains.append((ot - bt) / bt * 100)
                  if bt and rt and rt > 0:
                      aligns.append((bt - rt) / rt * 100)

              avg_gain = sum(gains) / len(gains) if gains else 0
              avg_align = sum(abs(a) for a in aligns) / len(aligns) if aligns else 0
              summary_parts = []
              if aligns:
                  summary_parts.append(f"**Alignment:** avg ±{avg_align:.1f}% vs Dashboard ({ref_date})")
              summary_parts.append(f"**Performance:** avg gain {avg_gain:+.1f}% across {len(gains)} points")

              evals = eval_by_script.get(script, {})
              if evals:
                  b_eval = evals.get("baseline", {}).get("eval_score")
                  o_eval = evals.get("optimized", {}).get("eval_score")
                  if b_eval is not None and o_eval is not None:
                      diff = (o_eval - b_eval) * 100
                      verdict = "OK" if diff >= -2.0 else "WARN"
                      summary_parts.append(f"**GSM8K:** {b_eval*100:.1f}% → {o_eval*100:.1f}% ({diff:+.1f}pp, {verdict})")

              print(" | ".join(summary_parts) + "\n")

              print("| Config | Official | Baseline | Optimized | Align | Gain | Verdict |")
              print("|--------|----------|----------|-----------|-------|------|---------|")

              for (s, tp, conc, isl, osl), modes in entries:
                  b = modes.get("baseline", {}); o = modes.get("optimized", {})
                  bt = b.get("output_tput_per_gpu"); ot = o.get("output_tput_per_gpu")
                  ref = official.get((isl, osl, conc, tp), {})
                  rt = ref.get("output_tput_per_gpu")

                  isl_s = f"{isl//1024}k" if isl % 1024 == 0 else str(isl)
                  osl_s = f"{osl//1024}k" if osl % 1024 == 0 else str(osl)
                  config = f"{isl_s}/{osl_s} tp{tp} c{conc}"
                  rt_s = f"{rt:.1f}" if rt else "N/A"

                  if bt and ot and bt > 0:
                      gain = (ot - bt) / bt * 100
                      align_s = f"{(bt - rt) / rt * 100:+.1f}%" if rt and rt > 0 else "N/A"
                      align_warn = " ⚠" if rt and rt > 0 and abs((bt - rt) / rt * 100) > 10 else ""
                      verdict = "OK" if gain >= -2.0 else "WARN: regression"
                      print(f"| {config} | {rt_s} | {bt:.1f} | {ot:.1f} | {align_s}{align_warn} | {gain:+.1f}% | {verdict} |")
                  else:
                      bt_s = f"{bt:.1f}" if bt else "FAIL"
                      ot_s = f"{ot:.1f}" if ot else "FAIL"
                      print(f"| {config} | {rt_s} | {bt_s} | {ot_s} | N/A | N/A | FAIL |")
              print()

              if evals:
                  b_eval = evals.get("baseline", {}).get("eval_score")
                  o_eval = evals.get("optimized", {}).get("eval_score")
                  b_str = f"{b_eval*100:.1f}%" if b_eval is not None else "N/A"
                  o_str = f"{o_eval*100:.1f}%" if o_eval is not None else "N/A"
                  if b_eval is not None and o_eval is not None:
                      diff = (o_eval - b_eval) * 100
                      verdict = "OK" if diff >= -2.0 else "WARN: accuracy drop"
                      diff_str = f"{diff:+.1f}pp"
                  else:
                      verdict = "N/A"
                      diff_str = "N/A"
                  print(f"**GSM8K Accuracy:** baseline={b_str} | optimized={o_str} | delta={diff_str} | {verdict}\n")

              note = "*Values: output\\_tput\\_per\\_gpu (output tok/s per GPU, ÷ TP)."
              note += " tput\\_per\\_gpu (total) and input\\_tput\\_per\\_gpu also recorded in summary artifact."
              if ref_date:
                  note += f" Official ref: [InferenceX Dashboard](https://inferencex.semianalysis.com/inference) MI300X ({ref_date}).*"
              else:
                  note += " Official ref: N/A (Dashboard unavailable).*"
              print(note + "\n")
          PY
          fi

          gh pr comment "$PR" --repo "$REPO" --body-file "$BODY"

      - name: Send Teams webhook notification
        # Skip Teams card on verify failure/cancel; PR comment still posts.
        if: needs.verify.result == 'success' && env.TEAMS_WEBHOOK_URL != ''
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          DASHBOARD_MAP: ${{ needs.detect.outputs.dashboard_map }}
        run: |
          pip install --quiet requests 2>/dev/null || true
          python3 - <<'TEAMS'
          import json, os, sys, time, requests
          from collections import defaultdict
          from pathlib import Path
          sys.path.insert(0, ".github/scripts")
          from dashboard_client import fetch_official_reference

          webhook = os.environ.get("TEAMS_WEBHOOK_URL", "")
          if not webhook:
              print("TEAMS_WEBHOOK_URL not set, skipping")
              sys.exit(0)

          pr_num = os.environ.get("PR_NUMBER", "?")
          pr_title = os.environ.get("PR_TITLE", "")
          pr_url = os.environ.get("PR_URL", "")
          dashboard_map = json.loads(os.environ.get("DASHBOARD_MAP", "{}"))

          summaries = sorted(Path("all-results").glob("summary-*.json"))
          if not summaries:
              print("No summaries found, skipping webhook")
              sys.exit(0)

          all_rows = []
          for p in summaries:
              try:
                  all_rows.extend(json.loads(p.read_text()))
              except Exception:
                  pass

          throughput_rows = [r for r in all_rows if not r.get("mode", "").endswith("-eval")]
          eval_rows = [r for r in all_rows if r.get("mode", "").endswith("-eval")]

          buckets = defaultdict(dict)
          for r in throughput_rows:
              key = (r["script"], r["tp"], r["conc"], r["isl"], r["osl"])
              buckets[key][r["mode"]] = r

          eval_by_script = defaultdict(dict)
          for r in eval_rows:
              mode = r["mode"].replace("-eval", "")
              eval_by_script[r["script"]][mode] = r

          # Fetch official data (with precision/framework filter)
          official_cache = {}
          for script, dash_cfg in dashboard_map.items():
              if isinstance(dash_cfg, str):
                  dash_cfg = {"model": dash_cfg}
              if dash_cfg.get("model"):
                  official_cache[script] = fetch_official_reference(
                      dash_cfg["model"],
                      precision=dash_cfg.get("precision") or None,
                      framework=dash_cfg.get("framework") or None,
                  )

          by_script = defaultdict(list)
          for key, modes in buckets.items():
              by_script[key[0]].append((key, modes))

          for script in sorted(by_script):
              pairs = by_script[script]
              official = official_cache.get(script, {})
              complete = [(k, m) for k, m in pairs
                          if m.get("baseline", {}).get("output_tput_per_gpu")
                          and m["baseline"]["output_tput_per_gpu"] > 0
                          and m.get("optimized", {}).get("output_tput_per_gpu")
                          and m["optimized"]["output_tput_per_gpu"] > 0]
              total_pairs = len(pairs)
              gains = [(m["optimized"]["output_tput_per_gpu"] - m["baseline"]["output_tput_per_gpu"])
                       / m["baseline"]["output_tput_per_gpu"] * 100
                       for k, m in complete]
              avg_gain = sum(gains) / len(gains) if gains else 0

              aligns = []
              for (s, tp, conc, isl, osl), modes in complete:
                  bt = modes["baseline"]["output_tput_per_gpu"]
                  ref = official.get((isl, osl, conc, tp), {})
                  rt = ref.get("output_tput_per_gpu")
                  if rt and rt > 0:
                      aligns.append(abs((bt - rt) / rt * 100))

              avg_align = sum(aligns) / len(aligns) if aligns else 0
              icon = "\u2705" if avg_gain >= -2.0 else "\u26a0\ufe0f"
              short = script.replace(".sh", "")

              header = ["Config", "Official", "Baseline", "Optimized", "Gain"]
              detail_rows = [{"type": "TableRow", "style": "accent", "cells": [
                  {"type": "TableCell", "items": [{"type": "TextBlock", "text": c, "weight": "Bolder", "size": "Small"}]}
                  for c in header
              ]}]

              for (s, tp, conc, isl, osl), modes in sorted(complete, key=lambda x: (x[0][3], x[0][4], x[0][1], x[0][2])):
                  bt = modes["baseline"]["output_tput_per_gpu"]
                  ot = modes["optimized"]["output_tput_per_gpu"]
                  gain = (ot - bt) / bt * 100
                  ref = official.get((isl, osl, conc, tp), {})
                  rt = ref.get("output_tput_per_gpu")

                  isl_s = f"{isl//1024}k" if isl % 1024 == 0 else str(isl)
                  osl_s = f"{osl//1024}k" if osl % 1024 == 0 else str(osl)
                  config = f"{isl_s}/{osl_s} tp{tp} c{conc}"
                  rt_s = f"{rt:.1f}" if rt else "N/A"
                  gc = "Good" if gain > 0 else "Attention" if gain < -2 else "Default"
                  detail_rows.append({"type": "TableRow", "cells": [
                      {"type": "TableCell", "items": [{"type": "TextBlock", "text": config, "size": "Small"}]},
                      {"type": "TableCell", "items": [{"type": "TextBlock", "text": rt_s, "size": "Small"}]},
                      {"type": "TableCell", "items": [{"type": "TextBlock", "text": f"{bt:.1f}", "size": "Small"}]},
                      {"type": "TableCell", "items": [{"type": "TextBlock", "text": f"{ot:.1f}", "size": "Small"}]},
                      {"type": "TableCell", "items": [{"type": "TextBlock", "text": f"{gain:+.1f}%", "size": "Small", "color": gc, "weight": "Bolder"}]},
                  ]})

              evals = eval_by_script.get(script, {})
              eval_text = ""
              if evals:
                  b_s = evals.get("baseline", {}).get("eval_score")
                  o_s = evals.get("optimized", {}).get("eval_score")
                  b_str = f"{b_s*100:.1f}%" if b_s is not None else "N/A"
                  o_str = f"{o_s*100:.1f}%" if o_s is not None else "N/A"
                  if b_s is not None and o_s is not None:
                      diff = (o_s - b_s) * 100
                      eval_text = f"GSM8K: {b_str} \u2192 {o_str} ({diff:+.1f}pp)"
                  else:
                      eval_text = f"GSM8K: {b_str} \u2192 {o_str}"

              subtitle = f"Avg Gain: {avg_gain:+.1f}%"
              if aligns:
                  subtitle += f" | Align: \u00b1{avg_align:.1f}%"
              subtitle += f" | {len(complete)}/{total_pairs} pairs"
              if eval_text:
                  subtitle += f" | {eval_text}"

              body = [
                  {"type": "TextBlock", "weight": "Bolder", "size": "Medium",
                   "text": f"{icon} PR#{pr_num} Verify: {short}"},
                  {"type": "TextBlock", "isSubtle": True, "spacing": "None", "wrap": True, "size": "Small",
                   "text": subtitle},
                  {"type": "TextBlock", "isSubtle": True, "spacing": "None", "size": "Small",
                   "text": "output_tput_per_gpu (tok/s/gpu)"},
                  {"type": "Table", "gridStyle": "accent", "firstRowAsHeader": True,
                   "columns": [{"width": 2}] + [{"width": 1}] * 4, "rows": detail_rows},
              ]

              card = {"type": "message", "attachments": [{"contentType": "application/vnd.microsoft.card.adaptive", "content": {
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  "type": "AdaptiveCard", "version": "1.5", "body": body,
                  "actions": [{"type": "Action.OpenUrl", "title": "View PR", "url": pr_url}],
              }}]}

              try:
                  resp = requests.post(webhook, json=card, timeout=15)
                  print(f"{short}: {resp.status_code}")
              except Exception as e:
                  print(f"{short}: webhook failed: {e}")
              time.sleep(5)
          TEAMS
