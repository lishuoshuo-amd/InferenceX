name: Verify PR (Hyperloom)
run-name: Verify PR - ${{ github.event.pull_request.title || github.sha }}

# Triggered when an auto-PR from Hyperloom gets the `verify-enabled` label
# (also re-runs on synchronize so PR updates re-verify automatically).
# Distinct from upstream's `sweep-enabled` label so we don't accidentally
# trigger run-sweep.yml (which can't run on fork without internal secrets).
# Detects which mi355x bench scripts changed, then runs each script twice
# (baseline=PR base ref, optimized=PR head ref) inside its docker image on
# our SaFE ARC runner scale set and posts a gain% table back to the PR.
# Each changed script runs as an independent matrix job (max-parallel: 6).

on:
  pull_request:
    types: [labeled, synchronize]
    paths:
      - "benchmarks/single_node/*mi355x*.sh"
      - "benchmarks/benchmark_lib.sh"

concurrency:
  group: verify-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  detect:
    if: contains(github.event.pull_request.labels.*.name, 'verify-enabled')
    runs-on: ubuntu-latest
    outputs:
      scripts: ${{ steps.diff.outputs.scripts }}
      count: ${{ steps.diff.outputs.count }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install yq (no sudo, runner-local)
        run: |
          mkdir -p "$HOME/bin"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          wget -qO "$HOME/bin/yq" \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          chmod +x "$HOME/bin/yq"

      - id: diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # Whitelist of scripts we know how to verify
          mapfile -t WHITELIST < <(yq '.scripts | keys | .[]' \
            .github/configs/hyperloom-verify.yaml)
          echo "Whitelist: ${WHITELIST[*]}"

          # Files changed in this PR under benchmarks/single_node/
          mapfile -t CHANGED < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- \
            'benchmarks/single_node/*.sh' | xargs -n1 basename || true)
          echo "Changed scripts: ${CHANGED[*]:-<none>}"

          # Intersect
          MATCHED=()
          for s in "${CHANGED[@]:-}"; do
            for w in "${WHITELIST[@]}"; do
              [[ "$s" == "$w" ]] && MATCHED+=("$s") && break
            done
          done

          if [[ ${#MATCHED[@]} -eq 0 ]]; then
            echo "scripts=[]" >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
          else
            JSON=$(printf '%s\n' "${MATCHED[@]}" | jq -R . | jq -sc .)
            echo "scripts=$JSON" >> "$GITHUB_OUTPUT"
            echo "count=${#MATCHED[@]}" >> "$GITHUB_OUTPUT"
          fi
          echo "Matched: ${MATCHED[*]:-<none>}"

  verify:
    needs: detect
    if: needs.detect.outputs.count != '0'
    runs-on: inferencexfork-t25db
    timeout-minutes: 600
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        script: ${{ fromJson(needs.detect.outputs.scripts) }}
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      MODELS_ROOT: /hyperloom/models
      RANDOM_RANGE_RATIO: "0.8"
      SCRIPT: ${{ matrix.script }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install yq + jq (no sudo, runner-local)
        run: |
          mkdir -p "$HOME/bin"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          if ! command -v yq >/dev/null; then
            wget -qO "$HOME/bin/yq" \
              https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
            chmod +x "$HOME/bin/yq"
          fi
          if ! command -v jq >/dev/null; then
            wget -qO "$HOME/bin/jq" \
              https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux-amd64
            chmod +x "$HOME/bin/jq"
          fi

      - name: Preflight check (docker / GPU / models)
        run: |
          set -e
          docker info >/dev/null
          ls /dev/kfd /dev/dri >/dev/null
          test -d "$MODELS_ROOT" || { echo "Missing $MODELS_ROOT"; exit 1; }

      - name: Run baseline + optimized for ${{ matrix.script }}
        run: |
          set -uo pipefail
          mkdir -p verify-results
          SUMMARY=verify-results/summary-${SCRIPT%.sh}.json
          echo '[]' > "$SUMMARY"

          run_one() {
            # $1=mode (baseline|optimized)  $2=ref
            local mode=$1 ref=$2
            local cfg=".github/configs/hyperloom-verify.yaml"
            local image model tp conc isl osl mml
            image=$(yq -r ".scripts[\"$SCRIPT\"].image" $cfg)
            model=$(yq -r ".scripts[\"$SCRIPT\"].model_path" $cfg)
            tp=$(yq -r ".scripts[\"$SCRIPT\"].tp" $cfg)
            conc=$(yq -r ".scripts[\"$SCRIPT\"].conc" $cfg)
            isl=$(yq -r ".scripts[\"$SCRIPT\"].isl" $cfg)
            osl=$(yq -r ".scripts[\"$SCRIPT\"].osl" $cfg)
            mml=$((isl + osl + 200))

            echo "::group::Run $mode @ $ref :: $SCRIPT"
            local work="verify-results/${SCRIPT%.sh}_${mode}"
            rm -rf "$work" && mkdir -p "$work"
            git --work-tree="$work" checkout "$ref" -- benchmarks utils runners 2>/dev/null || \
              git --work-tree="$work" checkout "$ref" -- benchmarks utils

            sed -i 's|^[[:space:]]*hf download.*|true # patched: model is local|' \
              "$work/benchmarks/single_node/$SCRIPT"

            docker pull "$image" || true

            local result_file="verify-${mode}-${SCRIPT%.sh}"
            set +e
            docker run --rm \
              --device=/dev/kfd --device=/dev/dri --group-add video \
              --security-opt seccomp=unconfined --cap-add=SYS_PTRACE \
              --network host --ipc host --shm-size 16g \
              -v "$PWD/$work":/workspace -w /workspace \
              -v "$MODELS_ROOT":"$MODELS_ROOT":ro \
              -e MODEL="$model" -e TP="$tp" -e CONC="$conc" \
              -e ISL="$isl" -e OSL="$osl" -e MAX_MODEL_LEN="$mml" \
              -e RANDOM_RANGE_RATIO="$RANDOM_RANGE_RATIO" \
              -e RESULT_FILENAME="$result_file" \
              -e RUN_EVAL=false -e EVAL_ONLY=false -e EXP_NAME=verify \
              "$image" \
              bash benchmarks/single_node/$SCRIPT
            local rc=$?
            set -e

            local json="$work/${result_file}.json"
            local throughput="null"
            if [[ -f "$json" ]]; then
              throughput=$(jq -r '.output_throughput // .total_token_throughput // .request_throughput // empty' "$json" || true)
            fi
            cp -f "$work/server.log" "verify-results/${mode}-${SCRIPT%.sh}.server.log" 2>/dev/null || true
            [[ -f "$json" ]] && cp -f "$json" "verify-results/${result_file}.json"

            jq --arg s "$SCRIPT" --arg m "$mode" --arg t "${throughput:-null}" \
               --arg c "$conc" --arg i "$isl" --arg o "$osl" --arg rc "$rc" \
               '. += [{script:$s, mode:$m, throughput:($t|tonumber? // null),
                       conc:($c|tonumber), isl:($i|tonumber), osl:($o|tonumber),
                       exit_code:($rc|tonumber)}]' \
               "$SUMMARY" > "$SUMMARY.tmp" && mv "$SUMMARY.tmp" "$SUMMARY"

            docker ps -q --filter "ancestor=$image" | xargs -r docker rm -f >/dev/null 2>&1 || true
            echo "::endgroup::"
          }

          run_one baseline "$BASE_SHA"
          run_one optimized "$HEAD_SHA"

          echo "=== summary for $SCRIPT ==="
          cat "$SUMMARY"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: verify-pr-results-${{ matrix.script }}
          path: verify-results/
          retention-days: 30

  comment:
    needs: [detect, verify]
    if: always() && needs.verify.result != 'skipped' && needs.detect.outputs.count != '0'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: all-results
          pattern: verify-pr-results-*
          merge-multiple: true
        continue-on-error: true

      - name: Render comment + post to PR
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          BODY=comment.md

          shopt -s nullglob
          summaries=(all-results/summary-*.json)
          if [[ ${#summaries[@]} -eq 0 ]]; then
            cat > "$BODY" <<EOF
          ### Verify PR (Hyperloom) — failed before producing results

          The verify jobs did not upload any summary. Check the workflow logs.
          EOF
          else
            python3 - "${summaries[@]}" > "$BODY" <<'PY'
          import json, sys, pathlib
          rows = []
          for p in sys.argv[1:]:
              try:
                  rows.extend(json.loads(pathlib.Path(p).read_text()))
              except Exception as e:
                  print(f"<!-- failed to read {p}: {e} -->")
          by_script = {}
          for r in rows:
              by_script.setdefault(r["script"], {})[r["mode"]] = r
          print("### Verify PR (Hyperloom) — Unofficial smoke test\n")
          print("> Only the upstream [InferenceX](https://github.com/SemiAnalysisAI/InferenceX) repo")
          print("> contains the Official InferenceX result. This fork verify is an Unofficial smoke")
          print("> test using a single (tp, conc) point per script; authoritative comparison runs")
          print("> on upstream after PR is opened against SemiAnalysisAI/InferenceX.\n")
          print("| Script | tp | conc | baseline (tok/s) | optimized (tok/s) | gain | verdict |")
          print("|---|---|---|---|---|---|---|")
          for s, modes in sorted(by_script.items()):
              b = modes.get("baseline", {}); o = modes.get("optimized", {})
              bt, ot = b.get("throughput"), o.get("throughput")
              tp = "?"  # tp is in hyperloom-verify.yaml, not in summary; could enrich later
              conc = b.get("conc") or o.get("conc")
              if bt and ot:
                  gain = (ot - bt) / bt * 100
                  verdict = "OK" if gain >= -2.0 else "WARN: regression"
                  print(f"| `{s}` | {tp} | {conc} | {bt:.2f} | {ot:.2f} | {gain:+.2f}% | {verdict} |")
              else:
                  print(f"| `{s}` | {tp} | {conc} | {bt or 'FAIL'} | {ot or 'FAIL'} | n/a | FAIL |")
          PY
          fi

          gh pr comment "$PR" --repo "$REPO" --body-file "$BODY"
