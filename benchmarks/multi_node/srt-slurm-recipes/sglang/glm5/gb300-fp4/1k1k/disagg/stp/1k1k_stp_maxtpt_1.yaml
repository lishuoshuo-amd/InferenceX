name: "gb300-fp4-glm5_1k1k_maxtpt_1"

# Ported from upstream srt-slurm recipes/gb300-fp4/glm5.yaml (PR #152).
# Upstream uses a single combined file with `zip_override_*` arrays
# expanded by srtctl across zip indices. We split into one flat yaml
# per concrete topology to match the InferenceX dsv4 sglang convention
# (see ../deepseek-v4/8k1k/*.yaml). All shared base envs and the
# prefill sglang_config are inlined here verbatim from the upstream
# `base:` block; the decode block is the upstream base plus the
# topology-specific override from this zip index.

model:
  path: "glm-5-fp4"
  container: "lmsysorg/sglang:v0.5.11-cu130"
  precision: "fp4"

# Released dynamo wheel — upstream recipe uses dynamo.version: "1.1.0".
# launch_gb300-cw.sh stages /configs/dynamo-wheels for `hash:` source
# builds (dsv4 path); the version path uses a released wheel and does
# not depend on that cache.
dynamo:
  version: "1.1.0"

slurm:
  time_limit: "03:00:00"

# Mirror dsv4 sglang recipes: cpus-per-task=144 avoids the 1-CPU
# default that turns dynamo install + sglang weight load into a serial
# crawl; mem=0 grants whole-node memory.
sbatch_directives:
  cpus-per-task: "144"
  mem: "0"

resources:
  gpu_type: "gb300"
  gpus_per_node: 4
  prefill_nodes: 2
  prefill_workers: 2
  gpus_per_prefill: 4
  decode_nodes: 8
  decode_workers: 1
  gpus_per_decode: 32

frontend:
  type: dynamo
  enable_multiple_frontends: true
  num_additional_frontends: 9

backend:
  type: sglang

  prefill_environment:
    TORCH_DISTRIBUTED_DEFAULT_TIMEOUT: "1800"
    PYTHONUNBUFFERED: "1"
    DYN_SKIP_SGLANG_LOG_FORMATTING: "1"
    SGLANG_DISAGGREGATION_HEARTBEAT_MAX_FAILURE: "100000"
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: "100000"
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: "100000"
    MC_TE_METRIC: "true"
    MC_FORCE_MNNVL: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    SGLANG_MOONCAKE_CUSTOM_MEM_POOL: "True"
    SGLANG_USE_MESSAGE_QUEUE_BROADCASTER: "0"
    SGLANG_DISABLE_TP_MEMORY_INBALANCE_CHECK: "1"

  decode_environment:
    TORCH_DISTRIBUTED_DEFAULT_TIMEOUT: "1800"
    PYTHONUNBUFFERED: "1"
    DYN_SKIP_SGLANG_LOG_FORMATTING: "1"
    SGLANG_DISAGGREGATION_HEARTBEAT_MAX_FAILURE: "100000"
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: "100000"
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: "100000"
    MC_TE_METRIC: "true"
    MC_FORCE_MNNVL: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    SGLANG_MOONCAKE_CUSTOM_MEM_POOL: "True"
    SGLANG_USE_MESSAGE_QUEUE_BROADCASTER: "0"
    SGLANG_DISABLE_TP_MEMORY_INBALANCE_CHECK: "1"
    SGLANG_DEEPEP_NUM_MAX_DISPATCH_TOKENS_PER_RANK: "512"
    SGLANG_MOE_NVFP4_DISPATCH: "1"

  sglang_config:
    prefill:
      # Model configuration
      served-model-name: "GLM-5-FP4"
      trust-remote-code: true
      quantization: "modelopt_fp4"
      kv-cache-dtype: "fp8_e4m3"

      # Disaggregation mode
      disaggregation-mode: "prefill"
      disaggregation-transfer-backend: "nixl"

      # Size limits
      max-running-requests: 256
      cuda-graph-max-bs: 256
      mem-fraction-static: 0.7
      context-length: 9600
      chunked-prefill-size: 32768
      max-prefill-tokens: 8192

      # Parallelism
      tensor-parallel-size: 4
      data-parallel-size: 4
      expert-parallel-size: 1
      enable-dp-attention: true
      enable-dp-lm-head: true
      load-balance-method: "total_tokens"

      # Backend
      nsa-decode-backend: "trtllm"
      nsa-prefill-backend: "trtllm"
      moe-runner-backend: "flashinfer_trtllm"
      fp4-gemm-backend: "flashinfer_cutlass"

      # Other flags
      # disable-shared-experts-fusion: true
      enable-flashinfer-allreduce-fusion: true
      disable-radix-cache: true
      weight-loader-prefetch-checkpoints: true
      model-loader-extra-config: '{"enable_multithread_load": true}'

    decode:
      # Model configuration
      served-model-name: "GLM-5-FP4"
      trust-remote-code: true

      quantization: "modelopt_fp4"
      kv-cache-dtype: "fp8_e4m3"

      # Disaggregation mode
      disaggregation-mode: "decode"
      disaggregation-transfer-backend: "nixl"

      # Memory and token limits
      mem-fraction-static: 0.8
      context-length: 9600

      # Backend
      nsa-decode-backend: "trtllm"
      nsa-prefill-backend: "trtllm"
      moe-runner-backend: "flashinfer_cutedsl"
      fp4-gemm-backend: "flashinfer_cutlass"

      # Detokenizer
      skip-tokenizer-init: true
      stream-interval: 30

      # Other flags
      # disable-shared-experts-fusion: true
      disable-radix-cache: true
      weight-loader-prefetch-checkpoints: true
      model-loader-extra-config: '{"enable_multithread_load": true}'
      # Parallelism (override from upstream zip_override_*_hightpt)
      tensor-parallel-size: 32
      expert-parallel-size: 32
      data-parallel-size:   32

      # dp
      enable-dp-lm-head: true
      enable-dp-attention: true
      moe-dense-tp-size: 1

      # ep
      ep-num-redundant-experts: 32
      ep-dispatch-algorithm: "static"

      moe-a2a-backend: "deepep"
      deepep-mode: "low_latency"
      deepep-config: "/configs/deepep_config.json"
      max-running-requests: 8192
      cuda-graph-max-bs:    256



health_check:
  max_attempts: 360
  interval_seconds: 10

benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  concurrencies: "8300"
  req_rate: "inf"
