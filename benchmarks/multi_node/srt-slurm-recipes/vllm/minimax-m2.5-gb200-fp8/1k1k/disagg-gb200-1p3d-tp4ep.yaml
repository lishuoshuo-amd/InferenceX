name: "minimax-m2.5-vllm-disagg-gb200-1p3d-tp4ep"

# Rate-matched tp4ep for FP8 GB200 1k/1k.
# X_tp4ep_fp8_gb200 = 17.9k tok/s; P_per_worker = 48k; ideal X/P = 0.37; 1P:3D = 0.33 ✓

model:
  path: "minimax-m2.5-fp8"
  container: "vllm/vllm-openai:v0.20.1"
  precision: "fp8"

dynamo:
  install: true
  wheel: "1.2.0.dev20260526"

setup_script: install-deps.sh

resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  prefill_nodes: 1
  decode_nodes: 3
  prefill_workers: 1
  decode_workers: 3
  gpus_per_prefill: 2
  gpus_per_decode: 4

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null

  prefill_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLASHINFER_ALLREDUCE_BACKEND: "mnnvl"

  decode_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLASHINFER_ALLREDUCE_BACKEND: "mnnvl"

  vllm_config:
    prefill:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 1
      pipeline-parallel-size: 1
      data-parallel-size: 2
      data-parallel-rpc-port: 13346
      enable-expert-parallel: true
      safetensors-load-strategy: "prefetch"
      trust-remote-code: true
      no-enable-prefix-caching: true
      stream-interval: 32

    decode:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 4
      pipeline-parallel-size: 1
      enable-expert-parallel: true
      safetensors-load-strategy: "prefetch"
      trust-remote-code: true
      no-enable-prefix-caching: true
      stream-interval: 32

benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  concurrencies: "1024"
