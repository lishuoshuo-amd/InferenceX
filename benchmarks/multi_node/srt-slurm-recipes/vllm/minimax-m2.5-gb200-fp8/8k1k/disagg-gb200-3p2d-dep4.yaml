name: "minimax-m2.5-vllm-disagg-gb200-8k1k-3p2d-dep4"

# Rate-matched dep4 for FP8 GB200 8k/1k.
# X_dep4_fp8_gb200_8k ≈ 9.8k tok/s (from 5p2d-dep4 saturation);
# P_per_worker_8k = 57k; ratio = X*8/P = 78.4/57 = 1.38; 3P:2D = 1.5 ✓ (closest int fit)

model:
  path: "minimax-m2.5-fp8"
  container: "vllm/vllm-openai:v0.20.1"
  precision: "fp8"

dynamo:
  install: true
  wheel: "1.2.0.dev20260526"

setup_script: install-deps.sh

resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  prefill_nodes: 2
  decode_nodes: 2
  prefill_workers: 3
  decode_workers: 2
  gpus_per_prefill: 2
  gpus_per_decode: 4

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null

  prefill_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLASHINFER_ALLREDUCE_BACKEND: "mnnvl"

  decode_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLASHINFER_ALLREDUCE_BACKEND: "mnnvl"

  vllm_config:
    prefill:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 1
      pipeline-parallel-size: 1
      data-parallel-size: 2
      data-parallel-rpc-port: 13346
      enable-expert-parallel: true
      max-num-batched-tokens: 16384
      safetensors-load-strategy: "prefetch"
      trust-remote-code: true
      no-enable-prefix-caching: true
      stream-interval: 32

    decode:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 1
      pipeline-parallel-size: 1
      data-parallel-size: 4
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      safetensors-load-strategy: "prefetch"
      trust-remote-code: true
      no-enable-prefix-caching: true
      stream-interval: 32

benchmark:
  type: "sa-bench"
  isl: 8192
  osl: 1024
  concurrencies: "1024x2048x4096"
