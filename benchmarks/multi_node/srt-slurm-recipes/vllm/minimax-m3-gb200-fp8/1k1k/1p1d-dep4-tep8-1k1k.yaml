name: "minimax-m3-vllm-disagg-gb200-1p1d-dep4-tep8-fp8-1k1k"

# 1P DEP4 prefill (TP1 DP4 EP, 4 GPU/worker) + 1D TEP8 decode (TP8 EP, 8 GPU/worker = 2 nodes each).
# GB200 has 4 GPUs/node.
# Nodes: 1 prefill + 2 decode (+ head/infra).

model:
  path: "minimax-m3-mxfp8"
  container: "vllm/vllm-openai:minimax-m3-perf-arm64-13.0.1-7a67223"
  precision: "fp8"


dynamo:
  install: true
  version: 1.3.0.dev20260614

health_check:
  max_attempts: 720
  interval_seconds: 10

sbatch_directives:
  mem: "0"
  cpus-per-task: "72"

srun_options:
  mem: "0"

resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  prefill_nodes: 1
  decode_nodes: 2
  prefill_workers: 1
  decode_workers: 1
  gpus_per_prefill: 4
  gpus_per_decode: 8

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null

  prefill_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLOAT32_MATMUL_PRECISION: "high"
    VLLM_FLASHINFER_ALLREDUCE_BACKEND: "mnnvl"
    UCX_CUDA_IPC_ENABLE_MNNVL: "y"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"

  decode_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    VLLM_FLOAT32_MATMUL_PRECISION: "high"
    VLLM_FLASHINFER_ALLREDUCE_BACKEND: "mnnvl"
    UCX_CUDA_IPC_ENABLE_MNNVL: "y"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"

  vllm_config:
    prefill:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      attention-config: '{"backend": "FLASHINFER", "use_trtllm_attention": true, "indexer_kv_dtype": "fp8"}'
      tensor-parallel-size: 1
      data-parallel-size: 4
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      trust-remote-code: true
      no-enable-prefix-caching: true
      block-size: 128
      gpu-memory-utilization: 0.90
      max-model-len: 2304
      language-model-only: true
      kv-cache-dtype: fp8
      stream-interval: 32
      max-cudagraph-capture-size: 2048
      max-num-batched-tokens: 2048

    decode:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      attention-config: '{"backend": "FLASHINFER", "use_trtllm_attention": true, "indexer_kv_dtype": "fp8"}'
      tensor-parallel-size: 8
      enable-expert-parallel: true
      trust-remote-code: true
      no-enable-prefix-caching: true
      block-size: 128
      gpu-memory-utilization: 0.90
      max-model-len: 2304
      language-model-only: true
      kv-cache-dtype: fp8
      stream-interval: 32
      max-num-seqs: 4096
      max-num-batched-tokens: 16384
      max-cudagraph-capture-size: 8196

benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  concurrencies: "128x256"
  req_rate: "inf"
