name: "svf-vllm-disagg-b200-low-middle-c256"
model:
  path: "deepseek-v4-pro"
  container: "vllm/vllm-openai:v0.23.0"
  precision: "fp4"
dynamo:
  install: true
  wheel: "1.2.0.dev20260426"
setup_script: vllm-container-deps.sh
slurm:
  time_limit: "8:00:00"
health_check:
  interval_seconds: 10
  max_attempts: 1440
sbatch_directives:
  segment: "1"
resources:
  decode_nodes: 1
  decode_workers: 1
  gpu_type: b200
  gpus_per_decode: 8
  gpus_per_node: 8
  gpus_per_prefill: 8
  prefill_nodes: 1
  prefill_workers: 1
infra:
  etcd_nats_dedicated_node: false
frontend:
  enable_multiple_frontends: false
  type: dynamo
backend:
  connector: null
  decode_environment:
    NCCL_CUMEM_ENABLE: '1'
    TILELANG_CLEANUP_TEMP_FILES: '1'
    UCX_MEMTYPE_CACHE: n
    UCX_MEMTYPE_REG_WHOLE: n
    UCX_NET_DEVICES: mlx5_0:1,mlx5_1:1,mlx5_2:1,mlx5_3:1,mlx5_4:1,mlx5_5:1,mlx5_10:1,mlx5_11:1
    VLLM_MAX_TOKENS_PER_EXPERT_FP4_MOE: '2048'
    VLLM_SERVER_DEV_MODE: '1'
  prefill_environment:
    NCCL_CUMEM_ENABLE: '1'
    PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    TILELANG_CLEANUP_TEMP_FILES: '1'
    UCX_MEMTYPE_CACHE: n
    UCX_MEMTYPE_REG_WHOLE: n
    UCX_NET_DEVICES: mlx5_0:1,mlx5_1:1,mlx5_2:1,mlx5_3:1,mlx5_4:1,mlx5_5:1,mlx5_10:1,mlx5_11:1
    VLLM_MAX_TOKENS_PER_EXPERT_FP4_MOE: '2048'
    VLLM_SERVER_DEV_MODE: '1'
    VLLM_SPARSE_INDEXER_MAX_LOGITS_MB: '1024'
  type: vllm
  vllm_config:
    decode:
      block-size: 256
      compilation-config: '{"cudagraph_mode":"FULL_DECODE_ONLY","mode":0}'
      data-parallel-rpc-port: 13345
      data-parallel-size: 8
      enable-ep-weight-filter: true
      enable-expert-parallel: true
      enable-sleep-mode: true
      gpu-memory-utilization: 0.9
      kv-cache-dtype: fp8
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      max-cudagraph-capture-size: 256
      max-model-len: 9280
      max-num-batched-tokens: 256
      max-num-seqs: 256
      no-disable-hybrid-kv-cache-manager: true
      no-enable-flashinfer-autotune: true
      no-enable-prefix-caching: true
      pipeline-parallel-size: 1
      served-model-name: deepseek-ai/DeepSeek-V4-Pro
      stream-interval: 50
      tensor-parallel-size: 1
      tokenizer-mode: deepseek_v4
      trust-remote-code: true
    prefill:
      block-size: 256
      data-parallel-rpc-port: 13345
      data-parallel-size: 8
      enable-ep-weight-filter: true
      enable-expert-parallel: true
      enable-sleep-mode: true
      enforce-eager: true
      gpu-memory-utilization: 0.95
      kv-cache-dtype: fp8
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      max-model-len: 9280
      max-num-batched-tokens: 32768
      max-num-seqs: 16
      no-async-scheduling: true
      no-disable-hybrid-kv-cache-manager: true
      no-enable-flashinfer-autotune: true
      no-enable-prefix-caching: true
      numa-bind: true
      pipeline-parallel-size: 1
      served-model-name: deepseek-ai/DeepSeek-V4-Pro
      tensor-parallel-size: 1
      tokenizer-mode: deepseek_v4
      trust-remote-code: true
benchmark:
  concurrencies: "256"
  custom_tokenizer: "sa_bench_tokenizers.vllm_deepseek_v4.VLLMDeepseekV4Tokenizer"
  isl: 8192
  osl: 1024
  req_rate: "inf"
  type: "sa-bench"
  use_chat_template: true
identity:
  model:
    repo: "deepseek-ai/DeepSeek-V4-Pro"
    revision: "0366e4e064385807ea86b088a5c6c878ff23343b"
  container:
    image: "vllm/vllm-openai:v0.23.0"
  frameworks:
    dynamo: "1.2.0.dev20260426"
    vllm: "0.23.0"
