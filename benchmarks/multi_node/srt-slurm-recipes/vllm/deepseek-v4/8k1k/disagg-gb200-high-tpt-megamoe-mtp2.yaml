name: "svf-vllm-disagg-gb200-high-tpt-megamoe-mtp2"

model:
  path: "deepseek-v4-pro"
  container: "vllm/vllm-openai:v0.20.1-ubuntu2404"
  precision: "fp4"

dynamo:
  install: true
  wheel: "1.2.0.dev20260426"

setup_script: vllm-container-deps.sh

slurm:
  time_limit: "8:00:00"

health_check:
  max_attempts: 1440
  interval_seconds: 10

resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  prefill_nodes: 4
  decode_nodes: 2
  prefill_workers: 2
  decode_workers: 1
  gpus_per_prefill: 8
  gpus_per_decode: 8

infra:
  etcd_nats_dedicated_node: true

frontend:
  type: dynamo
  enable_multiple_frontends: false
backend:
  type: vllm
  connector: null
  prefill_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    TILELANG_CLEANUP_TEMP_FILES: "1"
    VLLM_USE_NCCL_SYMM_MEM: "1"
    TORCH_SYMMMEM: "NVSHMEM"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    VLLM_SERVER_DEV_MODE: "1"
    VLLM_SPARSE_INDEXER_MAX_LOGITS_MB: "1024"
    VLLM_MAX_TOKENS_PER_EXPERT_FP4_MOE: "2048"
    # VLLM_RANDOMIZE_DP_DUMMY_INPUTS: "1"
    # VLLM_MOE_ROUTING_SIMULATION_STRATEGY: "uniform_random"
    UCX_MEMTYPE_CACHE: "n"
    UCX_MEMTYPE_REG_WHOLE: "n"
    UCX_TLS: "cuda_copy,cuda_ipc,tcp"
    UCX_CUDA_IPC_ENABLE_MNNVL: "y"
    NCCL_P2P_LEVEL: NVL
  decode_environment:
    VLLM_ENGINE_READY_TIMEOUT_S: "3600"
    TILELANG_CLEANUP_TEMP_FILES: "1"
    VLLM_USE_NCCL_SYMM_MEM: "1"
    TORCH_SYMMMEM: "NVSHMEM"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    VLLM_SERVER_DEV_MODE: "1"
    # VLLM_RANDOMIZE_DP_DUMMY_INPUTS: "1"
    # VLLM_MOE_ROUTING_SIMULATION_STRATEGY: "uniform_random"
    UCX_MEMTYPE_CACHE: "n"
    UCX_MEMTYPE_REG_WHOLE: "n"
    UCX_TLS: "cuda_copy,cuda_ipc,tcp"
    UCX_CUDA_IPC_ENABLE_MNNVL: "y"
    NCCL_P2P_LEVEL: NVL
  vllm_config:
    prefill:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 1
      pipeline-parallel-size: 1
      data-parallel-size: 8
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      enable-ep-weight-filter: true
      moe-backend: deep_gemm_mega_moe
      enforce-eager: true
      speculative-config: '{"method":"mtp","num_speculative_tokens":2}'
      attention-config: '{"use_fp4_indexer_cache":true}'
      max-model-len: 9280
      max-num-seqs: 16
      max-num-batched-tokens: 32768
      trust-remote-code: true
      no-enable-prefix-caching: true
      no-enable-flashinfer-autotune: true
      no-async-scheduling: true
      block-size: 256
      gpu-memory-utilization: 0.94
      no-disable-hybrid-kv-cache-manager: true
      enable-sleep-mode: true
      numa-bind: true
      tokenizer-mode: deepseek_v4
    decode:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 1
      pipeline-parallel-size: 1
      data-parallel-size: 8
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      enable-ep-weight-filter: true
      moe-backend: deep_gemm_mega_moe
      speculative-config: '{"method":"mtp","num_speculative_tokens":2}'
      attention-config: '{"use_fp4_indexer_cache":true}'
      max-model-len: 9280
      max-num-seqs: 512
      max-cudagraph-capture-size: 512
      max-num-batched-tokens: 1024
      trust-remote-code: true
      no-enable-prefix-caching: true
      no-enable-flashinfer-autotune: true
      block-size: 256
      compilation-config: '{"cudagraph_mode":"FULL_DECODE_ONLY","mode":0}'
      gpu-memory-utilization: 0.9
      stream-interval: 50
      no-disable-hybrid-kv-cache-manager: true
      enable-sleep-mode: true
      tokenizer-mode: deepseek_v4
benchmark:
  type: "sa-bench"
  isl: 8192
  osl: 1024
  concurrencies: "1024"
  req_rate: "inf"
  use_chat_template: true
  custom_tokenizer: "sa_bench_tokenizers.vllm_deepseek_v4.VLLMDeepseekV4Tokenizer"

identity:
  model:
    repo: "deepseek-ai/DeepSeek-V4-Pro"
    revision: "0366e4e064385807ea86b088a5c6c878ff23343b"
  container:
    image: "vllm/vllm-openai:v0.20.1-ubuntu2404"
  frameworks:
    dynamo: "1.2.0.dev20260426"
